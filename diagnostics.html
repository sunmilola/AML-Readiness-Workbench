<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Inferiva — Firebase Diagnostics</title><link rel="stylesheet" href="styles.css"/></head>
<body><div class="top"><div><strong>Inferiva Structural</strong> · Firebase Diagnostics</div><div><a href="login.html">Login</a></div></div><div class="wrap"><section class="hero"><div><h1>Firebase Diagnostics</h1><p class="muted">Confirm Authentication, Firestore access, user profile setup, and tenant access.</p></div><button class="btn" id="runBtn">Run checks</button></section><div id="notice" class="notice"></div><section class="card" style="margin-bottom:18px"><h2>Optional sign-in test</h2><div class="row"><div><label>Email</label><input id="email" type="email"/></div><div><label>Password</label><input id="password" type="password"/></div></div><div class="btn-row"><button class="btn" id="signInBtn">Sign in for diagnostics</button><button class="btn-alt" id="signOutBtn">Sign out</button></div></section><section class="card"><h2>Results</h2><div id="results" class="muted">Click Run checks.</div></section></div>
<script type="module">
import { firebaseConfigLooksValid, auth, db, showNotice } from './firebase-app.js';
import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
let currentUser=null; onAuthStateChanged(auth,u=>currentUser=u);
function line(label,ok,detail){return `<div style="padding:12px;border-bottom:1px solid #dbe3ee"><strong>${label}:</strong> <span style="color:${ok?'#1f7a4d':'#b42318'}">${ok?'OK':'FAILED'}</span><br><span class="muted">${detail||''}</span></div>`;}
async function run(){let html=''; const ok=firebaseConfigLooksValid(); html+=line('Firebase config placeholders replaced',ok,ok?'firebase-config.js appears to contain real values.':'firebase-config.js contains placeholders.'); html+=line('Auth initialized',!!auth,'Firebase Auth object exists.'); html+=line('Signed in user',!!currentUser,currentUser?currentUser.email+' / UID: '+currentUser.uid:'No user signed in.'); let profile=null; if(currentUser){try{const s=await getDoc(doc(db,'users',currentUser.uid)); html+=line('User profile users/{uid}',s.exists(),s.exists()?'Application profile exists.':'Auth user exists, but users/'+currentUser.uid+' does not exist.'); if(s.exists()){profile=s.data(); html+=line('Profile status',profile.status==='Active','status='+profile.status+', role='+profile.role+', tenantId='+profile.tenantId); if(!profile.role){html+=line('Required role field',false,'Add role, e.g. Compliance Officer, to users/'+currentUser.uid);}}}catch(err){html+=line('User profile lookup',false,(err.code||'')+' '+(err.message||err));}}
if(profile&&profile.tenantId){try{const t=await getDoc(doc(db,'tenants',profile.tenantId)); html+=line('Tenant document tenants/{tenantId}',t.exists(),t.exists()?'Tenant document exists.':'Tenant '+profile.tenantId+' does not exist.');}catch(err){html+=line('Tenant document lookup',false,(err.code||'')+' '+(err.message||err));}}
results.innerHTML=html;}
signInBtn.onclick=async()=>{try{await signInWithEmailAndPassword(auth,email.value.trim(),password.value);showNotice('Signed in. Run checks again.');}catch(err){showNotice('Sign-in failed: '+(err.code||err.message),'error');}};
signOutBtn.onclick=async()=>{await signOut(auth);showNotice('Signed out.');}; runBtn.onclick=run;
</script></body></html>
