<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Inferiva Structural</title>
  <meta name="description" content="Thank you for requesting a demo from Inferiva Structural." />
  <style>
    :root{--bg:#F6F9FC;--panel:#FFFFFF;--text:#0A2540;--muted:#425466;--line:#D8E4EE;--blue:#0A4B78;--shadow:0 1px 2px rgba(16,24,40,.04),0 24px 54px rgba(12,74,120,.06);--radius:28px}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,#fff 0%,var(--bg) 70%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(720px,100%);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:44px;text-align:center}.label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.24em;color:var(--blue)}h1{margin:14px 0 0;font-size:48px;line-height:1.05;letter-spacing:-.04em;font-weight:600}p{margin:20px auto 0;max-width:560px;font-size:18px;line-height:1.7;color:var(--muted)}a{display:inline-flex;margin-top:30px;border-radius:999px;background:var(--blue);color:#fff;text-decoration:none;padding:12px 20px;font-size:14px;font-weight:600;box-shadow:0 12px 30px rgba(10,75,120,.18)}@media(max-width:700px){.card{padding:32px 24px}h1{font-size:38px}}
  </style>
</head>
<body>
  <main class="card">
    <div class="label">Demo request received</div>
    <h1>Thank you for contacting Inferiva Structural.</h1>
    <p>Your demo request has been submitted. Our team will review your message and respond using the work email address you provided.</p>
    <a href="index.html#contact">Return to website →</a>
  </main>
</body>
</html>
