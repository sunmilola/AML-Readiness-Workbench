<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Inferiva — Initial Setup</title><link rel="stylesheet" href="styles.css"/></head><body><div class="wrap"><section class="hero"><div><h1>Initial Firebase Setup</h1><p class="muted">Sign in with the first Firebase Authentication admin user, then create the first institution and app profile.</p></div><div class="btn-row"><a class="btn-alt" href="diagnostics.html">Diagnostics</a><a class="btn-alt" href="login.html">Login</a></div></section><div id="notice" class="notice"></div><section class="card" style="margin-bottom:18px"><h2>Step 1 — Sign in</h2><div class="row"><div><label>Email</label><input id="email" type="email"/></div><div><label>Password</label><input id="password" type="password"/></div></div><div class="btn-row"><button class="btn" id="signInBtn">Sign in</button><button class="btn-alt" id="signOutBtn">Sign out</button></div><p class="muted" id="authState" style="margin-top:12px">Not signed in.</p></section><section class="card"><h2>Step 2 — Create first institution and admin profile</h2><form id="seedForm"><label>Admin full name</label><input id="fullName" required/><label>Institution ID</label><input id="tenantId" value="demo-institution" required/><label>Institution name</label><input id="tenantName" value="Demo Institution" required/><div class="row"><div><label>Institution type</label><input id="institutionType" value="Financial Institution"/></div><div><label>Country</label><input id="country"/></div></div><label>Regulator</label><input id="regulator"/><button class="btn" type="submit" style="margin-top:14px">Create setup records</button></form></section></div><script type="module">import{auth,db,showNotice}from'./firebase-app.js';import{signInWithEmailAndPassword,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';import{doc,setDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';let currentUser=null;onAuthStateChanged(auth,u=>{currentUser=u;authState.textContent=u?'Signed in as '+u.email+' / UID: '+u.uid:'Not signed in.';if(u&&!email.value)email.value=u.email});signInBtn.onclick=async()=>{try{await signInWithEmailAndPassword(auth,email.value.trim(),password.value);showNotice('Signed in. You can now create setup records.')}catch(err){showNotice('Sign-in failed: '+(err.code||err.message),'error')}};signOutBtn.onclick=async()=>{await signOut(auth);showNotice('Signed out.')};seedForm.onsubmit=async e=>{e.preventDefault();if(!currentUser){showNotice('Sign in first.','error');return}const tid=tenantId.value.trim();await setDoc(doc(db,'tenants',tid),{name:tenantName.value.trim(),institutionType:institutionType.value.trim(),country:country.value.trim(),regulator:regulator.value.trim(),status:'Active',createdAt:serverTimestamp(),updatedAt:serverTimestamp()},{merge:true});await setDoc(doc(db,'users',currentUser.uid),{fullName:fullName.value.trim(),email:currentUser.email.toLowerCase(),role:'System Administrator',status:'Active',tenantId:tid,createdAt:serverTimestamp(),updatedAt:serverTimestamp()},{merge:true});showNotice('Setup complete. Sign in through login.html.')};</script></body></html>
